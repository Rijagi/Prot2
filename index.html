<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tava & Flamingo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Tava & Flamingo</h1>

<div class="top-controls">
  <input type="text" id="search" placeholder="Search by brand, model, or year..." onkeyup="searchCar()">
  <button id="toggleBtn" onclick="toggleList()">Toggle Car List</button>
</div>

<ul id="carList"></ul>

<div id="modal" class="hidden">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">X</span>
    <h2 id="carTitle"></h2>
    <img id="carImage" src="" alt="Car image">
    <ul id="partsList"></ul>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
