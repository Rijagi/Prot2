<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tava & Flamingo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Tava & Flamingo</h1>

<input type="text" id="search" placeholder="Search car..." onkeyup="searchCar()">

<button onclick="toggleList()">Toggle Car List</button>

<ul id="carList">
  <li onclick="openCar('BMW E39')">BMW 5 Series (E39)</li>
  <li onclick="openCar('Mercedes W210')">Mercedes E-Class (W210)</li>
  <li onclick="openCar('Audi A4 B5')">Audi A4 (B5)</li>
</ul>

<!-- Modal -->
<div id="modal" class="hidden">
  <div class="modal-content">
    <span onclick="closeModal()">X</span>
    <h2 id="carTitle"></h2>
    <img id="carImage" src="">
    <ul id="partsList"></ul>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
